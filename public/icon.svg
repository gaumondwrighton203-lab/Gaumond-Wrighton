<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="40%" stop-color="#312e81" />
      <stop offset="70%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>

    <!-- Droplet Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Droplet Gradient -->
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>

    <!-- Spark/Zap Gradient -->
    <linearGradient id="zapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde047" />
      <stop offset="100%" stop-color="#eab308" />
    </linearGradient>
  </defs>

  <!-- iOS Icon Background with full square for system masking -->
  <rect width="512" height="512" fill="url(#bgGrad)" />

  <!-- Overlay subtle lighting effect -->
  <circle cx="150" cy="150" r="280" fill="white" opacity="0.08" filter="blur(20px)" />

  <!-- Graphic Composition Group -->
  <g transform="translate(256, 256) scale(1.1)">
    <!-- Water Droplet (Left-aligned) -->
    <path d="M-90,60 C-90,110 -50,140 0,140 C50,140 90,110 90,60 C90,10 0,-70 0,-70 C0,-70 -90,10 -90,60 Z" 
          fill="url(#dropGrad)" 
          opacity="0.9"
          filter="url(#glow)"
          transform="translate(-40, -10) rotate(-10) scale(0.9)" />

    <!-- Lightning / Spark Icon (Right-aligned overlay) -->
    <path d="M-20,30 L30,-70 L10,-70 L50,-150 L0,-50 L20,-50 Z" 
          fill="url(#zapGrad)" 
          filter="url(#glow)"
          transform="translate(45, 15) rotate(5) scale(1.2)" />
  </g>

  <!-- Glassmorphic border glow (full square border) -->
  <rect x="8" y="8" width="496" height="496" fill="none" stroke="white" stroke-width="6" opacity="0.15" />
</svg>
